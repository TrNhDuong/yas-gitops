apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev-storefront-ui
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: "https://github.com/TrNhDuong/yas_devops.git"
    targetRevision: "fix/k8s-minikube-yas-deploy"
    path: "k8s/charts/storefront-ui"
    helm:
      releaseName: "storefront-ui"
      parameters:
        - name: "ui.image.repository"
          value: "nguyenmanhha/yas-storefront"
        - name: "ui.image.tag"
          value: "8da87551b484a8125166aa9289aa6e7b0267da47"
        - name: "ui.extraEnvs[0].name"
          value: "API_BASE_PATH"
        - name: "ui.extraEnvs[0].value"
          value: "http://storefront.dev.yas.local.com/api"
          forceString: true
        - name: "ui.ingress.enabled"
          value: "false"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: "yas-dev"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
