apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev-inventory
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: "https://github.com/TrNhDuong/yas_devops.git"
    targetRevision: "fix/k8s-minikube-yas-deploy"
    path: "k8s/charts/inventory"
    helm:
      releaseName: "inventory"
      parameters:
        - name: "backend.image.repository"
          value: "nguyenmanhha/yas-inventory"
        - name: "backend.image.tag"
          value: "main"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: "yas-dev"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
