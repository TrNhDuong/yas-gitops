apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev-product
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: "https://github.com/TrNhDuong/yas_devops.git"
    targetRevision: "fix/k8s-minikube-yas-deploy"
    path: "k8s/charts/product"
    helm:
      releaseName: "product"
      parameters:
        - name: "backend.image.repository"
          value: "nguyenmanhha/yas-product"
        - name: "backend.image.tag"
          value: "13e7845e2bbd1c7422c99489abe3939e978974d2"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: "yas-dev"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
