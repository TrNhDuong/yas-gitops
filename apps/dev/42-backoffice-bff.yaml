apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev-backoffice-bff
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: "https://github.com/TrNhDuong/yas_devops.git"
    targetRevision: "fix/k8s-minikube-yas-deploy"
    path: "k8s/charts/backoffice-bff"
    helm:
      releaseName: "backoffice-bff"
      parameters:
        - name: "backend.image.repository"
          value: "nguyenmanhha/yas-backoffice-bff"
        - name: "backend.image.tag"
          value: "aa2459cdeadb37cd4368d3c2c6a72d9ada512833"
        - name: "backend.ingress.enabled"
          value: "true"
        - name: "backend.ingress.host"
          value: "backoffice.dev.yas.local.com"
          forceString: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: "yas-dev"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
