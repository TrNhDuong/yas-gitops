apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-staging-sampledata
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '2'
  labels:
    app.kubernetes.io/part-of: yas
    yas.dev/logical-environment: staging
    yas.dev/release-channel: git-tag
spec:
  project: yas
  source:
    repoURL: https://github.com/TrNhDuong/yas_devops.git
    targetRevision: main
    path: k8s/charts/sampledata
    helm:
      releaseName: sampledata
      parameters:
      - name: backend.image.repository
        value: "nguyenmanhha/yas-sampledata"
      - name: backend.image.tag
        value: "ebd7561f9b3609c21d2da775c15d8ee64cebe330"
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - ApplyOutOfSyncOnly=true
    - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
  revisionHistoryLimit: 5
