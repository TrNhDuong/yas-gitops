apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-staging-backoffice-bff
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: "https://github.com/TrNhDuong/yas_devops.git"
    targetRevision: "fix/k8s-minikube-yas-deploy"
    path: "k8s/charts/backoffice-bff"
    helm:
      parameters:
        - name: "backend.image.repository"
          value: "nguyenmanhha/yas-backoffice-bff"
        - name: "backend.image.tag"
          value: "main"
        - name: "backend.ingress.enabled"
          value: "true"
        - name: "backend.ingress.host"
          value: "backoffice.staging.yas.local.com"
          forceString: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: "yas-staging"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
