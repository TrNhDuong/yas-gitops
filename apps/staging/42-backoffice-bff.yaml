apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-staging-backoffice-bff
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '3'
  labels:
    app.kubernetes.io/part-of: yas
    yas.dev/logical-environment: staging
    yas.dev/release-channel: git-tag
spec:
  project: yas
  source:
    repoURL: https://github.com/TrNhDuong/yas_devops.git
    targetRevision: main
    path: k8s/charts/backoffice-bff
    helm:
      releaseName: backoffice-bff
      parameters:
      - name: backend.image.repository
        value: "nguyenmanhha/yas-backoffice-bff"
      - name: backend.image.tag
        value: "59f86e7f3d7281cc61d5f26896af8ef8726e1a15"
      - name: backend.ingress.enabled
        value: 'true'
      - name: backend.ingress.host
        value: backoffice.staging.yas.local.com
        forceString: true
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - ApplyOutOfSyncOnly=true
    - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
  revisionHistoryLimit: 5
