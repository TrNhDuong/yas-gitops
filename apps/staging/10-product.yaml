apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-staging-product
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '0'
  labels:
    app.kubernetes.io/part-of: yas
    yas.dev/logical-environment: staging
    yas.dev/release-channel: git-tag
spec:
  project: yas
  source:
    repoURL: https://github.com/TrNhDuong/yas_devops.git
    targetRevision: main
    path: k8s/charts/product
    helm:
      releaseName: product
      parameters:
      - name: backend.image.repository
        value: nguyenmanhha/yas-product
      - name: backend.image.tag
        value: 3ee27e4b250bcc2003726930f51149defda2bb28
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - ApplyOutOfSyncOnly=true
    - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
  revisionHistoryLimit: 5
