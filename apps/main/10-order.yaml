apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-main-order
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '0'
  labels:
    app.kubernetes.io/part-of: yas
    yas.dev/logical-environment: main
    yas.dev/source-branch: main
spec:
  project: yas
  source:
    repoURL: https://github.com/TrNhDuong/yas_devops.git
    targetRevision: main
    path: k8s/charts/order
    helm:
      releaseName: order
      parameters:
      - name: backend.image.repository
        value: nguyenmanhha/yas-order
      - name: backend.image.tag
        value: 13e7845e2bbd1c7422c99489abe3939e978974d2
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - ApplyOutOfSyncOnly=true
    - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
  revisionHistoryLimit: 5
