apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-main-root
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: yas
    yas.dev/logical-environment: main
spec:
  project: yas
  source:
    repoURL: https://github.com/TrNhDuong/yas-gitops.git
    targetRevision: main
    path: apps/main
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
  revisionHistoryLimit: 5
