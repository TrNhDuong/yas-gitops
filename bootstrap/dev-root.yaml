apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/Duong-Dung/yas-gitops.git"
    targetRevision: "main"
    path: "apps/dev"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
