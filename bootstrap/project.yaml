apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: yas
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: yas
spec:
  description: YAS Project 2 - dev from main and staging from release tags
  sourceRepos:
    - https://github.com/TrNhDuong/yas-gitops.git
    - https://github.com/TrNhDuong/yas_devops.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: yas-dev
    - server: https://kubernetes.default.svc
      namespace: yas-staging
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  orphanedResources:
    warn: true
