# Separate workflow for the rubric item "Dev & Staging without Argo CD".
# It intentionally deploys to yas-direct-* so it does not fight Argo CD.
name: Direct Helm CD demo

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Direct deployment environment
        required: true
        type: choice
        options: [dev, staging]
      service:
        description: Service to deploy
        required: true
        type: choice
        options: [tax, customer]
      image_tag:
        description: Existing Docker image tag
        required: true
        type: string

jobs:
  deploy-test-cleanup:
    runs-on: self-hosted
    env:
      NAMESPACE: yas-direct-${{ inputs.environment }}
      SERVICE: ${{ inputs.service }}
      IMAGE_TAG: ${{ inputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Direct Helm deployment
        shell: bash
        run: |
          helm upgrade --install "${SERVICE}" "./k8s/charts/${SERVICE}" \
            --namespace "${NAMESPACE}" \
            --create-namespace \
            --set "backend.image.repository=${{ vars.DOCKERHUB_USERNAME }}/yas-${SERVICE}" \
            --set "backend.image.tag=${IMAGE_TAG}"

      - name: Wait and test port
        shell: bash
        run: |
          kubectl rollout status "deployment/${SERVICE}" -n "${NAMESPACE}" --timeout=180s
          kubectl run "smoke-${GITHUB_RUN_ID}" -n "${NAMESPACE}" --rm -i --restart=Never \
            --image=curlimages/curl -- \
            curl --fail --retry 10 --retry-delay 3 "http://${SERVICE}:8080/actuator/health"

      - name: Cleanup smoke-test resources
        if: always()
        shell: bash
        run: |
          kubectl delete pod -n "${NAMESPACE}" -l purpose=smoke-test --ignore-not-found
